name: Java CI

on:
  pull_request:
    paths: ['src/**', 'build.gradle', 'settings.gradle']
  push:
    branches: [main]
    paths: ['src/**', 'build.gradle', 'settings.gradle']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew test
